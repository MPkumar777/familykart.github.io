<!DOCTYPE html>
<html>
<head>
    <title>Family Kart</title>
    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            background:#111;
            font-family:Arial,sans-serif;
        }

        .hero{
            height:100vh;
            background:url('https://images.unsplash.com/photo-1511707171634-5f897ff02aa9');
            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .overlay{
            background:rgba(0,0,0,0.65);
            width:100%;
            height:100%;

            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;

            text-align:center;
            color:white;
        }

        h1{
            font-size:60px;
            margin-bottom:15px;
        }

        p{
            font-size:24px;
            margin-bottom:40px;
        }

        a{
            text-decoration:none;
            background:#E31E24;
            color:white;
            padding:15px 30px;
            margin:10px;
            border-radius:30px;
            display:inline-block;
        }

    </style>
</head>

<body>

<div class="hero">

    <div class="overlay">

        <h1>WELCOME TO FAMILY KART</h1>

        <p>Everything for Your Family & Home</p>

        <a href="https://www.ebay.com/usr/YOUR_EBAY_USERNAME" target="_blank">
            Visit eBay Store
        </a>

        <a href="https://instagram.com/YOUR_INSTAGRAM" target="_blank">
            Instagram
        </a>

        <a href="https://facebook.com/YOUR_PAGE" target="_blank">
            Facebook
        </a>

    </div>

</div>

</body>
</html>
